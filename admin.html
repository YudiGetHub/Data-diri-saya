<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel - Nur Wahyudi</title>
    <style>
        :root { --primary: #2c3e50; --accent: #27ae60; --blue: #3498db; --red: #e74c3c; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--primary); color: white; padding: 20px; }
        .panel { background: #34495e; padding: 25px; border-radius: 12px; max-width: 600px; margin: 20px auto; box-shadow: 0 10px 25px rgba(0,0,0,0.3); }
        input, textarea, select { width: 100%; padding: 12px; margin-bottom: 15px; border-radius: 6px; border: none; box-sizing: border-box; background: #ecf0f1; color: #333; }
        h3 { border-bottom: 2px solid var(--blue); padding-bottom: 5px; margin-bottom: 20px; color: #3498db; }
        button { width: 100%; padding: 14px; border: none; border-radius: 6px; font-weight: bold; cursor: pointer; margin-top: 10px; transition: 0.3s; }
        .btn-blue { background: var(--blue); color: white; }
        .btn-green { background: var(--accent); color: white; }
        .btn-red { background: var(--red); color: white; padding: 5px 10px; width: auto; font-size: 12px; }
        .pass-container { position: relative; width: 100%; }
        .toggle-pass { position: absolute; right: 10px; top: 12px; color: #333; cursor: pointer; font-size: 18px; }
        .list-item { background: rgba(255,255,255,0.1); padding: 10px; border-radius: 5px; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; }
        #adminContent { display: none; }
    </style>
</head>
<body>

    <div id="loginSection" class="panel">
        <h2 style="text-align:center">Admin Login</h2>
        <input type="text" id="userInput" placeholder="Username">
        <div class="pass-container">
            <input type="password" id="passInput" placeholder="Password">
            <span class="toggle-pass" onclick="togglePassword()">👁️</span>
        </div>
        <button class="btn-blue" onclick="checkLogin()">MASUK</button>
    </div>

    <div id="adminContent">
        <div class="panel">
            <h3>1. Edit Profil</h3>
            <input type="text" id="p_nama" placeholder="Nama Lengkap">
            <input type="text" id="p_slogan" placeholder="Slogan">
            <input type="text" id="p_foto" placeholder="Link Foto Profil (Direct Link)">
            <textarea id="p_bio" rows="4" placeholder="Tentang Saya"></textarea>
            <button class="btn-blue" onclick="updateProfil()">UPDATE INFO PROFIL</button>
        </div>

        <div class="panel">
            <h3>2. Tambah Pengalaman</h3>
            <input type="text" id="exp_posisi" placeholder="Posisi">
            <input type="text" id="exp_PT" placeholder="Perusahaan">
            <input type="text" id="exp_tahun" placeholder="Tahun">
            <textarea id="exp_desc" rows="3" placeholder="Deskripsi..."></textarea>
            <button class="btn-green" onclick="addExp()">TAMBAH PENGALAMAN</button>
            <div id="admin-exp-list"></div>
        </div>

        <div class="panel">
            <h3>3. Kelola Sertifikat</h3>
            <input type="text" id="cert_nama" placeholder="Nama Sertifikat">
            <input type="text" id="cert_link" placeholder="Link Gambar (Direct Link)">
            <button class="btn-green" onclick="addCert()">TAMBAH SERTIFIKAT</button>
            <div id="admin-cert-list"></div>
        </div>
        
        <p style="text-align:center"><button onclick="logout()" style="background:none; color:#bdc3c7;">Log Out</button></p>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, doc, setDoc, collection, addDoc, onSnapshot, deleteDoc, query, orderBy } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyC8JJ5-_eLfev8PL5J1hUQpKyc8EVKQ7_k",
            authDomain: "datadiri-saya.firebaseapp.com",
            projectId: "datadiri-saya",
            storageBucket: "datadiri-saya.firebasestorage.app",
            messagingSenderId: "38066794822",
            appId: "1:38066794822:web:cb97ebfc41dd53794c3547"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        window.togglePassword = () => {
            const passInput = document.getElementById('passInput');
            passInput.type = passInput.type === "password" ? "text" : "password";
        };

        window.checkLogin = () => {
            const user = document.getElementById('userInput').value;
            const pass = document.getElementById('passInput').value;
            // Penting: Huruf besar kecil harus sama persis
            if(user === "Admin" && pass === "Yudi0201#") {
                document.getElementById('loginSection').style.display='none';
                document.getElementById('adminContent').style.display='block';
                sessionStorage.setItem("yudi_auth", "true");
            } else { alert("Login Gagal!"); }
        };

        window.updateProfil = async () => {
            await setDoc(doc(db, "settings", "profil"), {
                nama: document.getElementById('p_nama').value,
                slogan: document.getElementById('p_slogan').value,
                foto: document.getElementById('p_foto').value,
                bio: document.getElementById('p_bio').value
            });
            alert("Terupdate!");
        };

        window.addExp = async () => {
            await addDoc(collection(db, "pengalaman"), {
                posisi: document.getElementById('exp_posisi').value,
                perusahaan: document.getElementById('exp_PT').value,
                tahun: document.getElementById('exp_tahun').value,
                deskripsi: document.getElementById('exp_desc').value,
                createdAt: new Date()
            });
            alert("Berhasil!");
        };

        window.addCert = async () => {
            const nama = document.getElementById('cert_nama').value;
            const link = document.getElementById('cert_link').value;
            await addDoc(collection(db, "sertifikat"), { nama, link, createdAt: new Date() });
            alert("Sertifikat Berhasil!");
        };

        window.deleteData = async (coll, id) => {
            if(confirm("Hapus?")) { await deleteDoc(doc(db, coll, id)); }
        };

        onSnapshot(query(collection(db, "pengalaman"), orderBy("createdAt", "desc")), (snap) => {
            const list = document.getElementById('admin-exp-list');
            list.innerHTML = "";
            snap.forEach(res => {
                list.innerHTML += `<div class="list-item"><span>${res.data().posisi}</span>
                <button class="btn-red" onclick="deleteData('pengalaman', '${res.id}')">Hapus</button></div>`;
            });
        });

        window.logout = () => { sessionStorage.clear(); location.reload(); };
        if(sessionStorage.getItem("yudi_auth") === "true") {
            document.getElementById('loginSection').style.display='none';
            document.getElementById('adminContent').style.display='block';
        }
    </script>
</body>
</html>
