<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Super Admin - Nur Wahyudi</title>
    <style>
        :root { --primary: #2c3e50; --accent: #27ae60; --blue: #3498db; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--primary); color: white; padding: 20px; }
        .panel { background: #34495e; padding: 25px; border-radius: 12px; max-width: 500px; margin: 20px auto; box-shadow: 0 10px 25px rgba(0,0,0,0.3); }
        input, textarea { width: 100%; padding: 12px; margin-bottom: 15px; border-radius: 6px; border: none; box-sizing: border-box; background: #ecf0f1; }
        h3 { border-bottom: 2px solid var(--blue); padding-bottom: 5px; margin-bottom: 20px; color: #3498db; }
        button { width: 100%; padding: 14px; border: none; border-radius: 6px; font-weight: bold; cursor: pointer; margin-top: 10px; }
        .btn-blue { background: var(--blue); color: white; }
        .btn-green { background: var(--accent); color: white; }
        #adminContent { display: none; }
    </style>
</head>
<body>

    <div id="loginSection" class="panel">
        <h2 style="text-align:center">Admin Login</h2>
        <input type="text" id="userInput" placeholder="Username">
        <input type="password" id="passInput" placeholder="Password">
        <button class="btn-blue" onclick="checkLogin()">MASUK</button>
    </div>

    <div id="adminContent">
        <div class="panel">
            <h3>1. Edit Profil Utama</h3>
            <label>Nama Lengkap</label>
            <input type="text" id="p_nama" placeholder="Contoh: Nur Wahyudi">
            <label>Slogan / Jabatan</label>
            <input type="text" id="p_slogan" placeholder="Contoh: Full-Stack Mobile Developer">
            <label>Link Foto Profil (Direct Link)</label>
            <input type="text" id="p_foto" placeholder="Link dari ImgBB">
            <label>Tentang Saya (Bio)</label>
            <textarea id="p_bio" rows="4"></textarea>
            <button class="btn-blue" onclick="updateProfil()">UPDATE INFO PROFIL</button>
        </div>

        <div class="panel">
            <h3>2. Tambah Pengalaman Kerja</h3>
            <input type="text" id="exp_posisi" placeholder="Posisi">
            <input type="text" id="exp_PT" placeholder="Perusahaan">
            <input type="text" id="exp_tahun" placeholder="Tahun">
            <textarea id="exp_desc" rows="3" placeholder="Deskripsi..."></textarea>
            <button class="btn-green" onclick="addExp()">TAMBAH PENGALAMAN</button>
        </div>
        
        <p style="text-align:center"><button onclick="logout()" style="background:none; color:#bdc3c7;">Log Out</button></p>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, doc, setDoc, collection, addDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyC8JJ5-_eLfev8PL5J1hUQpKyc8EVKQ7_k",
            authDomain: "datadiri-saya.firebaseapp.com",
            projectId: "datadiri-saya",
            storageBucket: "datadiri-saya.firebasestorage.app",
            messagingSenderId: "38066794822",
            appId: "1:38066794822:web:cb97ebfc41dd53794c3547"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        window.checkLogin = () => {
            if(document.getElementById('userInput').value === "Admin" && document.getElementById('passInput').value === "Yudi0201#") {
                document.getElementById('loginSection').style.display='none';
                document.getElementById('adminContent').style.display='block';
                sessionStorage.setItem("yudi_auth", "true");
            } else { alert("Salah!"); }
        };

        window.updateProfil = async () => {
            try {
                await setDoc(doc(db, "settings", "profil"), {
                    nama: document.getElementById('p_nama').value,
                    slogan: document.getElementById('p_slogan').value,
                    foto: document.getElementById('p_foto').value,
                    bio: document.getElementById('p_bio').value
                });
                alert("Profil Berhasil Diubah!");
            } catch (e) { alert(e.message); }
        };

        window.addExp = async () => {
            try {
                await addDoc(collection(db, "pengalaman"), {
                    posisi: document.getElementById('exp_posisi').value,
                    perusahaan: document.getElementById('exp_PT').value,
                    tahun: document.getElementById('exp_tahun').value,
                    deskripsi: document.getElementById('exp_desc').value,
                    createdAt: new Date()
                });
                alert("Pengalaman Ditambahkan!");
                location.reload();
            } catch (e) { alert(e.message); }
        };

        window.logout = () => { sessionStorage.clear(); location.reload(); };
        if(sessionStorage.getItem("yudi_auth") === "true") {
            document.getElementById('loginSection').style.display='none';
            document.getElementById('adminContent').style.display='block';
        }
    </script>
</body>
</html>
